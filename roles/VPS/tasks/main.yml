## gost install start
   ###### gost2 :
   - name: set gost2 ver
     set_fact:
        GOST2_VER: 2.11.3
     tags: gost2

   - name: set gost2 arch
     set_fact:
        ARCH: linux-amd64
     tags: [gost2]

   - name: set gost2 url
     set_fact:
        gost2_url: 'https://github.com/ginuerzh/gost/releases/download/v{{GOST2_VER}}/gost-{{ARCH}}-{{GOST2_VER}}.gz'
     tags: gost2

   - name: Check if gost2 is installed
     command: gost -V
     register: gost2_version
     ignore_errors: true
     tags: gost2
     changed_when: false
     failed_when: false

   - debug:
        var: gost2_version
     tags: gost2

   - name: install gost2
     shell:
        cmd: "curl -L -m60 {{gost2_url}} | gunzip -dc > /usr/local/bin/gost.new && mv /usr/local/bin/gost.new /usr/local/bin/gost && chmod 755 /usr/local/bin/gost"
     tags: gost2
     notify: [ gost_proxy restart ]
     when: '( "msg" in gost2_version and "No such file or directory" in gost2_version.msg)  or ("stdout" in gost2_version and "{{ GOST2_VER }}" not in gost2_version.stdout)'

   ###### gost3 :
   - name: set gost3 arch
     set_fact:
        ARCH: linux_amd64
     tags: [gost3]

   - name: set gost3 ver
     set_fact:
        GOST3_VER: 3.0.0
     tags: gost3

   - name: set gost3 url
     set_fact:
        gost3_url: 'https://github.com/go-gost/gost/releases/download/v{{GOST3_VER}}/gost_{{GOST3_VER}}_{{ARCH}}.tar.gz'
     tags: gost3

   - name: Check if gost3 is installed
     command: gost3 -V
     register: gost3_version
     ignore_errors: true
     tags: gost3
     changed_when: false
     failed_when: false

   - debug:
        var: gost3_version
     tags: gost3

   - name: install gost3
     shell:
        cmd: "curl -L -m60 {{gost3_url}}  -o /tmp/gost3.tgz  && ls -lah /tmp/gost3.tgz && rm -rf /tmp/gost3/ && mkdir -p /tmp/gost3/ && tar xf /tmp/gost3.tgz -C /tmp/gost3/ && mv /tmp/gost3/gost /usr/local/bin/gost3"
     tags: gost3
     when: '( "msg" in gost3_version and "No such file or directory" in gost3_version.msg)  or ("stdout" in gost3_version and "{{ GOST3_VER }} " not in gost3_version.stdout)'

    # end gost installation

###### caddy installation :
   - name: set caddy ver
     set_fact:
        CADDY_URL: "https://tun1.tanatos.org/repo/caddy/caddy-v2.10.0.x86_64"
        CADDY_VER: 'v2.10.0 h1:fonubSaQKF1YANl8TXqGcn4IbIRUDdfAkpcsfI/vX5U='
     tags: caddy

   - name: Check if caddy is installed
     command: caddy -v
     register: caddy_version
     ignore_errors: true
     tags: caddy
     changed_when: false
     failed_when: false

   - debug:
        var: caddy_version
     tags: caddy

   - name: install caddy
     shell:
        cmd: "curl -L -m60 {{CADDY_URL}} -o /tmp/caddy && mv /tmp/caddy /usr/local/bin/caddy && chmod 755 /usr/local/bin/caddy && setcap 'cap_net_bind_service=+ep' /usr/local/bin/caddy "
     tags: caddy
     when: '( "msg" in caddy_version and "No such file or directory" in caddy_version.msg)  or ("stdout" in caddy_version and "{{ CADDY_VER }}" not in caddy_version.stdout)'

   - name: Create caddy system user (no login)
     tags: caddy
     ansible.builtin.user:
        name: caddy
        shell: /usr/sbin/nologin
        system: yes
        create_home: yes
        home:  /var/lib/caddy

   - name: Create systemd service unit for Caddy
     tags: caddy
     notify: [ reload systemctl, caddy restart ]
     copy:
        dest: /etc/systemd/system/caddy.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Caddy Web Server
          After=network.target

          [Service]
          User=caddy
          Group=caddy
          ExecStart=/usr/local/bin/caddy run --resume
          Restart=on-failure
          LimitNOFILE=1048576

          [Install]
          WantedBy=multi-user.target

   - name: enable caddy.service
     systemd:
        name: caddy
        enabled: yes
        state: started
     tags: caddy

#    # end caddy installation

   - name: Set up multiple authorized keys for ROOT
     authorized_key:
        user: root
        state: present
        key: '{{ item }}'
     loop: "{{ root_pub_keys }}"
     tags: [ ssh ]

   - name: create /etc/ssh/sshd_config.d
     file:
        path: /etc/ssh/sshd_config.d
        state: directory

   - name: set custom SSHD conf
     copy:
        dest: /etc/ssh/sshd_config.d/proxysmart.conf
        content:  |
            ClientAliveCountMax 3
            ClientAliveInterval 3
            GatewayPorts clientspecified
            LoginGraceTime 10
            MaxStartups 100:30:1000
     notify: sshd restart
     tags: ssh

   - name: create user fwd
     user:
        name: fwd
        shell: /bin/bash
     tags: ssh

   - name: Check if local SSH keys directory exists
     connection: local
     stat:
        path: "proxysmart.ssh.pubkeys"
     register: ssh_keys_dir
     tags: ssh

   - name: set fact ssh_pubkeys (multiline var)
     tags: ssh
     set_fact:
        ssh_pubkeys : |
            {% if ssh_keys_dir.stat.exists and ssh_keys_dir.stat.isdir %}
                {% for fn in lookup('fileglob', "proxysmart.ssh.pubkeys/*", wantlist=True) %}
                {{ lookup('file', fn) }}
                {% endfor %}
            {% else %}
                # No SSH keys directory found
            {% endif %}

   - name: Set up multiple authorized keys for PROXYSMART boxes FROM LOCAL FOLDER
     tags: [ fwd, ssh ]
     authorized_key:
        user: fwd
        state: present
        key: "{{ ssh_pubkeys }}"

   - name: Set up multiple authorized keys for PROXYSMART boxes
     tags: [ fwd, ssh ]
     loop: "{{ ssh_pub_keys }}"
     authorized_key:
        user: fwd
        key: "{{ item }}"

   - name: create iperf service
     notify: [ reload systemctl, iperf3 restart ]
     template:
        src: files/etc/systemd/system/iperf3.service
        dest: /etc/systemd/system/iperf3.service
     tags: iperf

   - name: enable iperf service
     systemd:
        name: iperf3
        enabled: yes
        state: started
        daemon_reload: yes
     tags: iperf

   - name: create gost_proxy.service (for VPN server UDP port exposing)
     notify: [ reload systemctl, gost_proxy restart ]
     template:
        src: files/etc/systemd/system/gost_proxy.service
        dest: /etc/systemd/system/gost_proxy.service
     tags: vpn_i

   - name: enable gost_proxy.service
     systemd:
        name: gost_proxy
        enabled: yes
        state: started
     tags: vpn_i


