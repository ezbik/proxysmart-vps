   - name: put Gost logrotate
     tags: [ gost , logrotate ]
     copy:
        dest: /etc/logrotate.d/gost
        content: |
            /var/log/gost/*.log {
                    missingok
                    compress
                    notifempty
                    daily
                    rotate {{ logrotate_days }}
                    copytruncate
                    dateext
                    dateformat -%Y-%m-%d_%H-%M-%S
            }
    ########## Gost / UDP end

    ######## haproxy start
   - name: install haproxy
     tags: [ haproxy ]
     apt:
            name:
                - haproxy
            state: present
            install_recommends: no
     when:   haproxy_enabled == 1

   - name: uninstall haproxy
     tags: [ haproxy ]
     apt:
            name:
              - haproxy
            state: absent
     when:   haproxy_enabled == 0

   - name: put haproxy logrotate
     tags: [ haproxy , logrotate ]
     copy:
        dest: /etc/logrotate.d/haproxy
        content: |
            /var/log/haproxy.log {
                daily
                rotate {{ logrotate_days }}
                missingok
                notifempty
                compress
                postrotate
                    /usr/lib/rsyslog/rsyslog-rotate
                endscript
            }
     when:   haproxy_enabled == 1

   - name: create haproxy log if not exists
     copy:
        dest: /var/log/haproxy.log
        owner: syslog
        group: syslog
        content: ""
        force: false
     tags: haproxy
     notify: [ haproxy restart, rsyslog restart ]
     when:   haproxy_enabled == 1

   - name: copy haproxy conf
     template:
        src: files/haproxy/haproxy.cfg
        dest: /etc/haproxy/haproxy.cfg
     notify: [ haproxy restart, rsyslog restart ]
     tags: haproxy
     when:   haproxy_enabled == 1

   - name: copy rsyslog conf for haproxy
     copy:
        src: files/haproxy/49-haproxy.conf
        dest: /etc/rsyslog.d/49-haproxy.conf
     notify: [ haproxy restart, rsyslog restart ]
     tags: haproxy
     when:   haproxy_enabled == 1

   - name: enable haproxy
     systemd:
        name: haproxy
        enabled: yes
        state: started
     tags: haproxy
     when:   haproxy_enabled == 1

   - name: disable haproxy
     systemd:
        name: haproxy
        enabled: no
        state: stopped
     tags: haproxy
     when:   haproxy_enabled == 0

   - name: enable rsyslog
     systemd:
        name: rsyslog
        enabled: yes
        state: started
     tags: haproxy
    ######## haproxy end

